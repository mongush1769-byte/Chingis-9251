<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="jquery-4.0.0.min (1).js"></script>
</head>

<body>
    <input type="checkbox" checked> 
    <input type="checkbox"> 
    <input type="checkbox" checked> 

    <button id="task1">Снять все</button>
    <button id="task2">Отметить все</button>
    <button id="task3">Инверсия</button>
    <script>
        $('#task1').click(function () {
            $('input[type="checkbox"]').prop('checked', false);
        });
        $('#task3').click(function () {
            $('input[type="checkbox"]').prop('checked', function (i, value) {
                return !value;
            });
        });
 $('#task2').click(function () {
            $('input[type="checkbox"]').prop('checked', true);
        });

    </script>
</body>

</html>
