
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="jquery-4.0.0.min (1).js"></script>
</head>
<body>
<h2>Мой заголовок</h2>
<p>Существующий текст</p>
<h3>Другой заголовок</h3>
<div>Не абзац</div>

    <script>
$('h1, h2, h3, h4, h5, h6').each(function() {
  const $header = $(this);
  const $nextElement = $header.next();

  if ($nextElement.is('p')) {
    const headerText = $header.text();
    $nextElement.append(headerText);
  }
});

    </script>
</body>
