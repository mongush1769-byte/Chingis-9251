
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="jquery-4.0.0.min (1).js"></script>
</head>
<body>
<h2>Заголовок для копирования</h2>
<span>Какой‑то текст</span>
<h3>Ещё заголовок</h3>
<p>Уже существующий абзац</p>

    <script>
$('h1, h2, h3, h4, h5, h6').each(function() {
  const $header = $(this);
  const $nextElement = $header.next();

  if (!$nextElement.is('p')) {
    const headerText = $header.text();
    $('<p>').text(headerText).insertAfter($header);
  }
});

    </script>
</body>
